version: "3.8"

services:
  api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    depends_on:
      - redis
      - evolution-postgres
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - WA_BUSINESS_TOKEN_WEBHOOK=impulso_webhook_token
    networks:
      - impulso-net
    env_file:
      - .env
    expose:
      - "8080"     

  redis:
    container_name: evolution_redis
    image: redis:latest
    restart: always
    command: >
      redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      impulso-net:
        aliases:
          - evolution-redis
    expose:
      - "6379"

  evolution-postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    env_file:
      - .env
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
    environment:
      - POSTGRES_DB=evolution_db
      - POSTGRES_USER=impulso_hub
      - POSTGRES_PASSWORD=impulso_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - impulso-net
    expose:
      - "5432"  
               
volumes:
  evolution_instances:
  evolution_redis:
  postgres_data:

networks:
  impulso-net:
    external: true